<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Island Game MVP</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe3;
            --panel: rgba(255, 250, 240, 0.92);
            --ink: #183153;
            --accent: #0f8b8d;
            --accent-2: #f4a261;
            --line: rgba(24, 49, 83, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top, rgba(15, 139, 141, 0.18), transparent 28%),
                linear-gradient(180deg, #d8f3dc 0%, #fefae0 50%, #faedcd 100%);
            min-height: 100vh;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 16px;
            padding: 16px;
            min-height: 100vh;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 16px 48px rgba(24, 49, 83, 0.1);
        }

        .game {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }

        .arena {
            position: relative;
            flex: 1;
            min-height: 540px;
            background:
                radial-gradient(circle at 50% 50%, #fefae0 0, #fefae0 140px, #b7e4c7 141px, #95d5b2 220px, #52b69a 221px, #168aad 100%);
            overflow: hidden;
        }

        .player {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 700;
            transform: translate(-50%, -50%);
        }

        .player.me {
            background: var(--accent-2);
        }

        .player span {
            position: absolute;
            top: 34px;
            white-space: nowrap;
            color: var(--ink);
            font-size: 12px;
            font-weight: 600;
        }

        .sidebar {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 16px;
            padding: 16px;
        }

        .field,
        .chat-input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
        }

        .button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            background: var(--accent);
            color: white;
        }

        .players,
        .chat {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.6);
        }

        .players ul,
        .chat ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .players li,
        .chat li {
            padding: 8px 0;
            border-bottom: 1px solid var(--line);
        }

        .players li:last-child,
        .chat li:last-child {
            border-bottom: 0;
        }

        .chat-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .muted {
            opacity: 0.75;
            font-size: 13px;
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .arena {
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <main class="layout">
        <section class="panel game">
            <div class="toolbar">
                <div>
                    <strong>Island Game MVP</strong>
                    <div class="muted">Click en la isla para mover tu jugador</div>
                </div>
                <div id="connectionStatus" class="muted">Desconectado</div>
            </div>
            <div id="arena" class="arena"></div>
        </section>

        <aside class="panel sidebar">
            <section>
                <label for="playerName"><strong>Tu nombre</strong></label>
                <input id="playerName" class="field" maxlength="20" placeholder="Ej. Nico">
                <button id="connectButton" class="button" type="button">Entrar a la isla</button>
            </section>

            <section class="players">
                <strong>Jugadores conectados</strong>
                <ul id="playersList"></ul>
            </section>

            <section class="chat">
                <strong>Chat global</strong>
                <ul id="chatList"></ul>
            </section>

            <form id="chatForm" class="chat-form">
                <input id="chatInput" class="chat-input" maxlength="160" placeholder="Escribe un mensaje">
                <button class="button" type="submit">Enviar</button>
            </form>
        </aside>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        const arena = document.getElementById("arena");
        const playersList = document.getElementById("playersList");
        const chatList = document.getElementById("chatList");
        const connectButton = document.getElementById("connectButton");
        const playerNameInput = document.getElementById("playerName");
        const connectionStatus = document.getElementById("connectionStatus");
        const chatForm = document.getElementById("chatForm");
        const chatInput = document.getElementById("chatInput");

        let connection;
        let myUserId = null;
        let users = [];

        function renderPlayers() {
            arena.innerHTML = "";
            playersList.innerHTML = "";

            users.forEach((user) => {
                const marker = document.createElement("div");
                marker.className = `player ${user.id === myUserId ? "me" : ""}`.trim();
                marker.style.left = `${user.posX}px`;
                marker.style.top = `${user.posY}px`;
                marker.textContent = user.nombre.slice(0, 2).toUpperCase();

                const label = document.createElement("span");
                label.textContent = user.nombre;
                marker.appendChild(label);
                arena.appendChild(marker);

                const item = document.createElement("li");
                item.textContent = `${user.nombre} (${Math.round(user.posX)}, ${Math.round(user.posY)})`;
                playersList.appendChild(item);
            });
        }

        function addChatMessage(message) {
            const item = document.createElement("li");
            const time = new Date(message.fechaUtc).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });
            item.textContent = `[${time}] ${message.nombre}: ${message.mensaje}`;
            chatList.prepend(item);
        }

        async function connect() {
            const nombre = playerNameInput.value.trim() || "Jugador";

            connection = new signalR.HubConnectionBuilder()
                .withUrl("/hub/isla")
                .withAutomaticReconnect()
                .build();

            connection.onreconnecting(() => {
                connectionStatus.textContent = "Reconectando...";
            });

            connection.onreconnected(() => {
                connectionStatus.textContent = "Conectado";
            });

            connection.on("EstadoInicial", (payload) => {
                myUserId = payload.tuUsuarioId;
                users = payload.usuarios;
                renderPlayers();
            });

            connection.on("ActualizarUsuarios", (payload) => {
                users = payload;
                renderPlayers();
            });

            connection.on("ActualizarPosicion", (user) => {
                const index = users.findIndex((entry) => entry.id === user.id);
                if (index >= 0) {
                    users[index] = user;
                } else {
                    users.push(user);
                }
                renderPlayers();
            });

            connection.on("UsuarioDesconectado", (userId) => {
                users = users.filter((user) => user.id !== userId);
                renderPlayers();
            });

            connection.on("RecibirChatGlobal", addChatMessage);

            await connection.start();
            connectionStatus.textContent = "Conectado";
            await connection.invoke("Conectar", nombre);
        }

        connectButton.addEventListener("click", async () => {
            if (connection) {
                return;
            }

            try {
                await connect();
            } catch (error) {
                connectionStatus.textContent = "Error al conectar";
                console.error(error);
            }
        });

        arena.addEventListener("click", async (event) => {
            if (!connection) {
                return;
            }

            const bounds = arena.getBoundingClientRect();
            const x = Math.max(14, Math.min(bounds.width - 14, event.clientX - bounds.left));
            const y = Math.max(14, Math.min(bounds.height - 14, event.clientY - bounds.top));

            try {
                await connection.invoke("Mover", x, y);
            } catch (error) {
                console.error(error);
            }
        });

        chatForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            if (!connection || !chatInput.value.trim()) {
                return;
            }

            try {
                await connection.invoke("EnviarChatGlobal", chatInput.value.trim());
                chatInput.value = "";
            } catch (error) {
                console.error(error);
            }
        });
    </script>
</body>
</html>
